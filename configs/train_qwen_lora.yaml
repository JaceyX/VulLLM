model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
output_dir: outputs/qwen_vullm_lora

max_seq_length: 2048
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 1
learning_rate: 0.0002
warmup_ratio: 0.03
logging_steps: 5
save_steps: 50
eval_steps: 50

use_qlora: true
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
